#-------------------------------------------------------------------------------------
#   Format
#-------------------------------------------------------------------------------------

format = """
$line_break \
$directory\
$git_branch\
$git_status\
$cmd_duration\
$docker\
$aws\
$status
[ в””в”ҖвһӨ ](blue)"""

#--- properties ---#
add_newline = true 
continuation_prompt = "в–¶в–¶ "


#-------------------------------------------------------------------------------------
#   Palette
#-------------------------------------------------------------------------------------

palette = "abysal-obsidian"

[palettes.abysal-obsidian]
background = "#dcdcdc"
overlay = "#cfcfcf"
text = "#2f2f2f"
blue = "#2c9279"
orange = "#b55b25"
yellow = "#947635"
red = "#a8474a"


#-------------------------------------------------------------------------------------
#   Elements
#-------------------------------------------------------------------------------------

[directory]
truncation_length = 3
fish_style_pwd_dir_length = 3
truncate_to_repo = true
home_symbol = " ~"
read_only = " пҖЈ "
format = "[оӮә](fg:blue)[в—Ө](fg:blue bg:overlay)[ пҒј ](bold fg:text bg:overlay)[$path](bold fg:text bg:overlay)[$read_only ](bold fg:orange bg:overlay)[в—Ө](fg:overlay)"

[git_branch]
format = "[оӮә](fg:blue)[в—Ө](fg:blue bg:overlay)[ пҗҳ ](bold fg:text bg:overlay)[$branch](bold fg:text bg:overlay)"
truncation_symbol = "вҖҰ/"

[git_status]
format = "[ $all_status$ahead_behind ](bold fg:orange bg:overlay)[в—Ө](fg:overlay)"
stashed = " пҖң"
ahead = " вҶ‘"
behind = " вҶ“"
diverged = " вҶ•"
conflicted = " пҒ—"
untracked = " ?"
staged = " +"
modified = " !"
renamed = " В»"
deleted = " вңҳ"

[cmd_duration]
min_time = 0
format = "[оӮә](fg:blue)[в—Ө](fg:blue bg:overlay)[ вҸұ  ](bold fg:text bg:overlay)[$duration ](bold fg:text bg:overlay)[в—Ө](fg:overlay)"
show_milliseconds = true

[status]
disabled = false
format = "[оӮә](fg:red)[в—Ө](fg:red bg:overlay)[ вңҳ ](bold fg:red bg:overlay)[в—Ө](fg:overlay)"


#-------------------------------------------------------------------------------------
#   Extra Elements
#-------------------------------------------------------------------------------------

[line_break]
disabled = false

[aws]
symbol = "оҢҪ "
format = "[оӮә](fg:blue)[в—Ө](fg:blue bg:overlay)[ $symbol](bold fg:orange bg:overlay)[в—Ө](bold fg:overlay)"

[docker_context]
symbol = "пҢҲ "
format = "[оӮә](fg:blue)[в—Ө](fg:blue bg:overlay)[ $symbol](bold fg:orange bg:overlay)[в—Ө](bold fg:overlay)"
