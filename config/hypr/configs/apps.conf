#--------------------------------------------------------------------------------
# Programs - default apps or scripts
#--------------------------------------------------------------------------------

$terminal = ghostty -e zsh --no-rcs -c "kotofetch; exec zsh"
$fileManager = ghostty --class=yazi -e yazi
$top = ghostty --class=btop -e btop
$bluethoot = ghostty --class=bluetui -e bluetui
$network = ghostty --class=nmtui -e nmtui
$fetch = ghostty --class=fastfetch -e zsh -c "fastfetch; read ''"


#--------------------------------------------------------------------------------
# Screenshots & pickers
#--------------------------------------------------------------------------------

$picker = hyprpicker
$printer_simple = grim -g "$(slurp -b 00000050)" - | wl-copy && notify-send "Screenshot" "Copied to clipboard"
$printer_save = grim -g "$(slurp -b 00000050)" ~/media/screenshots/$(date '+%m%d-%Hh-%Mm-%Ss').png && notify-send "Screenshot" "Saved in media directory"
$printer_edit = grim -g "$(slurp -b 00000050)" -t ppm - | satty --filename -



#--------------------------------------------------------------------------------
# Quickshell - for scripts and launchers
#--------------------------------------------------------------------------------

$menu = quickshell ipc --config lucyna call toggleLauncher handle
$powermenu = quickshell ipc --config lucyna call togglePower handle
$clipboard = quickshell ipc --config lucyna call toggleClip handle
$calendar = quickshell ipc --config lucyna call toggleCalendar handle
$reload = killall quickshell && quickshell --config lucyna


#--------------------------------------------------------------------------------
# Autostart
#--------------------------------------------------------------------------------

#--- Apps ---#
exec-once = swww-daemon & dunst & hypridle &

#--- Quickshell ---#
exec-once = quickshell --config lucyna

#--- Services ---#
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &

#--- Cursor ---#
exec-once = hyprctl setcursor phinger-cursors-light 25

#--- clipboard ---#
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
