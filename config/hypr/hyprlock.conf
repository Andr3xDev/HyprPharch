#--------------------------------------------------------------------------------
# General things and background
#--------------------------------------------------------------------------------

source = ~/.config/hypr/theme/colors.conf
$font_family = JetBrains Mono Nerd Font Mono
$font_bold = JetBrains Mono Nerd Font Mono ExtraBold

general {
    immediate_render = true
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
    hide_cursor = false
    ignore_empty_input = true
    text_trim = true
}

background {
    path = $wallpaper
    blur_passes = 2
    blur_size = 6
    brightness = $lock_background_brightness
}


#--------------------------------------------------------------------------------
# Time clock
#--------------------------------------------------------------------------------

# Hours
label {
    text = cmd[update:1000] echo -e "$(date +"%I")"
    color = $lock_time_hours
    font_size = 150
    font_family = $font_bold
    position = -30, -150
    halign = center
    valign = top
    shadow_passes = 1
    shadow_size = 3
    shadow_color = $lock_shadow
    shadow_boost = 1
}

# Minutes
label {
    text = cmd[update:1000] echo -e "$(date +"%M")"
    color = $lock_time_minutes
    font_size = 130
    font_family = $font_bold
    position = 30, -320
    halign = center
    valign = top
    shadow_passes = 1
    shadow_size = 3
    shadow_color = $lock_shadow
    shadow_boost = 1
}

# Date
label {
    text = cmd[update:1000] echo -e "$(date +"%d-%m-%Y")"
    color = $lock_time_date
    font_size = 15
    font_family = $font_bold
    position = -90, -400
    rotate = 270
    halign = center
    valign = top
}


#--------------------------------------------------------------------------------
# Input field
#--------------------------------------------------------------------------------

input-field {
    size = 300, 45
    dots_size = 0.1
    dots_spacing = 0.2
    dots_center = true
    inner_color = $lock_input_bg
    outer_color = $lock_input_border
    font_color = $lock_input_text
    font_family = $font_family
    fade_on_empty = false
    placeholder_text = <span>Only binary...</span>
    hide_input = false
    position = 0, 250
    halign = center
    valign = bottom 
    zindex = 10
    rounding = 6
    fail_timeout = 1000
    fail_text = <i>Uhhh?</i>
}


#--------------------------------------------------------------------------------
# Action field
#--------------------------------------------------------------------------------

shape {
    size = 200, 50
    color = $lock_actions_bg
    border_size = 2
    border_color = $lock_actions_border
    rounding = 6
    position = 0, 5
    halign = center
    valign = bottom
}

# Reboot
label {
    text = 󰜉
    color = $lock_actions_text
    font_size = 20
    onclick = systemctl reboot
    position = -70, 15
    halign = center
    valign = bottom
}

# Suspend
label {
    text = 󰤄
    color = $lock_actions_text
    font_size = 20
    onclick = systemctl suspend
    position = 0, 15
    halign = center
    valign = bottom
}

# Power off
label {
    text = 󰐥
    color = $lock_actions_text
    font_size = 20
    onclick = systemctl poweroff
    position = 70, 15
    halign = center
    valign = bottom
}


#--------------------------------------------------------------------------------
# Other
#--------------------------------------------------------------------------------

# Battery container (Sand border for contrast)
shape {
    size = 70, 25
    color = $lock_battery_bg
    rounding = 6
    border_size = 2
    border_color = $lock_battery_border
    rotate = 0
    position = -10, 10
    halign = right
    valign = bottom
    zindex = 0
}

label {
    text = cmd[update:5000] echo "<span>$(upower -i /org/freedesktop/UPower/devices/DisplayDevice | grep percentage | awk '{print $2}') 󰁹</span>"
    color = $lock_battery_text
    font_size = 10
    font_family = $font_family
    position = -30, 15
    halign = right
    valign = bottom
    zindex = 0
}
