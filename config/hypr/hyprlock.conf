#--------------------------------------------------------------------------------
# General things
#--------------------------------------------------------------------------------

source = ~/.config/hypr/theme/colors.conf
$font_family = MADE Soulmaze Brush
$font_bold = MADE Soulmaze Brush

general {
    immediate_render = true
    hide_cursor = false
    text_trim = true
}

animations {
    bezier = elegantOut, 0.23, 1, 0.32, 1
    bezier = elegantIn, 0.4, 0, 0.2, 1

    animation = fadeIn,           1, 10, elegantOut
    animation = fadeOut,          1, 6,  elegantIn
    animation = inputFieldDots,   1, 4,  elegantOut
    animation = inputFieldColors, 1, 5,  elegantOut
}


#--------------------------------------------------------------------------------
# Background elements
#--------------------------------------------------------------------------------

background {
    path = $wallpaper
    blur_passes = 0
    blur_size = 0
    brightness = $lock_background_brightness
}

shape {
    size = 40%, 70%
    color = $lock_backsurface 
    rounding = 10
    border_size = 10
    border_color = $lock_border_color
    rotate = 0
    xray = false
    position = 130, 0
    halign = left
    valign = center
    zindex = 0
}


#--------------------------------------------------------------------------------
# Time clock
#--------------------------------------------------------------------------------

# Hours
label {
    text = cmd[update:500] echo -e "<span> $(date +"%H:%M")</span>"
    color = $lock_time_hours
    font_size = 200
    font_family = $font_bold
    position = 215, 160
    halign = left
    valign = center
    shadow_passes = 1
    shadow_size = 3
    shadow_color = $lock_shadow
    shadow_boost = 1
}

# Date
label {
    text = cmd[update:1000] echo -e "<span> $(date +"%a - %d - %b")</span>"
    color = $lock_time_date
    font_size = 20
    font_family = $font_bold
    position = -436, 20
    halign = center
    valign = center
}


#--------------------------------------------------------------------------------
# Input field
#--------------------------------------------------------------------------------

input-field {
    size = 300, 45
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    inner_color = $lock_input_bg
    outer_color = $lock_input_border
    font_color = $lock_input_text
    font_family = $font_family
    fade_on_empty = false
    placeholder_text = <span>Only binary...</span>
    hide_input = false
    position = -436, -115
    halign = center
    valign = center
    zindex = 10
    rounding = 6
    fail_text = <i>403 Forbidden</i>
}


#--------------------------------------------------------------------------------
# Action field
#--------------------------------------------------------------------------------

# Reboot
label {
    text = <span> 󰜉 </span>
    color = $lock_actions_text
    font_size = 20
    onclick = systemctl reboot
    position = -516, -190
    halign = center
    valign = center

}

# Suspend
label {
    text = <span> 󰤄 </span>
    color = $lock_actions_text
    font_size = 20
    onclick = systemctl suspend
    position = -436, -190
    halign = center
    valign = center
}

# Power off
label {
    text = <span> 󰐥 </span>
    color = $lock_actions_text
    font_size = 20
    onclick = systemctl poweroff
    position = -356, -190
    halign = center
    valign = center
}


#--------------------------------------------------------------------------------
# Other
#--------------------------------------------------------------------------------

# Battery container
shape {
    size = 70, 25
    color = $lock_battery_bg
    rounding = 6
    border_size = 2
    border_color = $lock_battery_border
    rotate = 0
    position = -10, 10
    halign = right
    valign = bottom
    zindex = 0
}

label {
    text = cmd[update:5000] echo "<span>$(upower -i /org/freedesktop/UPower/devices/DisplayDevice | grep percentage | awk '{print $2}') 󰁹</span>"
    color = $lock_battery_text
    font_size = 10
    font_family = $font_family
    position = -30, 15
    halign = right
    valign = bottom
    zindex = 0
}
