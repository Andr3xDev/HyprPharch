[global]
    format = "<b>%s %p</b>\n%b"
    sort = yes
    indicate_hidden = true
    idle_threshold = 0
    width = 300
    alignment = center
    show_age_threshold = 40
    sticky_history = yes
    word_wrap = yes
    separator_height = 2
    horizontal_padding = 10
    follow = mouse
    frame_width = 3
    corner_radius = 8
    offset = (20,20)
    separator_color = "#2e2e2e"

[urgency_low]
    background = "#262626"
    foreground = "#cfcfcf"
    frame_color = "#2e2e2e"
    timeout = 7
    format = "<b><span color='#d1b171'>%s</span></b>\n%b"

[urgency_normal]
    background = "#262626"
    foreground = "#cfcfcf"
    frame_color = "#2e2e2e"
    timeout = 7
    format = "<b><span color='#52c9b0'>%s</span></b>\n%b"

[urgency_critical]
    background = "#262626"
    foreground = "#cfcfcf"
    frame_color = "#d47779"
    highlight = "#d47779"
    timeout = 10
    format = "<b><span color='#d47779'>%s</span></b>\n%b"
